<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="#090b0c" rx="64"/>
  
  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#brandGradient)" stroke-width="8" opacity="0.3"/>
    
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="url(#brandGradient)" stroke-width="6" opacity="0.4" transform="rotate(-20)"/>
    
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="url(#brandGradient)" stroke-width="6" opacity="0.4" transform="rotate(20)"/>
    
    <line x1="0" y1="-120" x2="0" y2="120" stroke="url(#brandGradient)" stroke-width="5" opacity="0.35"/>
    
    <ellipse cx="0" cy="0" rx="45" ry="120" fill="none" stroke="url(#brandGradient)" stroke-width="5" opacity="0.35"/>
    
    <ellipse cx="0" cy="0" rx="180" ry="70" fill="none" stroke="url(#orbitGradient)" stroke-width="10" stroke-linecap="round" transform="rotate(-30)">
      <animateTransform attributeName="transform" type="rotate" from="-30" to="330" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    
    <circle cx="155" cy="-90" r="12" fill="url(#brandGradient)"/>
  </g>
</svg>
